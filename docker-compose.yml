services:
  db:
    image: postgres:17-alpine
    container_name: db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    image: my_django_app:local
    container_name: django_web
    working_dir: /app/src
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "${DJANGO_PORT}:8000"
    volumes:
      - ./src:/app/src
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    image: my_django_app:local
    pull_policy: never
    container_name: celery_worker
    working_dir: /app/src
    command: celery -A config worker --loglevel=info
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: on-failure

  celery_beat:
    image: my_django_app:local
    pull_policy: never
    container_name: celery_beat
    working_dir: /app/src
    command: celery -A config beat --loglevel=info
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: on-failure

  flower:
    image: my_django_app:local
    pull_policy: never
    container_name: celery_flower
    working_dir: /app/src
    command: celery -A config flower --port=5555 --broker=redis://redis:6379/0
    ports:
      - "${FLOWER_PORT}:5555"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
  media_volume:
