name: Flake8 Linting

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  flake8:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        pip install -r requirements.txt

    - name: Run flake8
      run: |
        flake8 src/ --count --max-line-length=100 --max-complexity=10 --show-source --statistics

    - name: Run tests
      working-directory: ./src
      env:
        PYTHONPATH: .
      run: |
        python manage.py test
